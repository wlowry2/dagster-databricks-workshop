name: Build and Push Docker Image

# Required GitHub repository variables (Settings > Secrets and variables > Variables):
#   ECR_REGISTRY  - e.g. 123456789012.dkr.ecr.us-west-2.amazonaws.com
#   ECR_REPO_NAME - e.g. databricks-demo
#   AWS_REGION    - e.g. us-west-2
#
# Required GitHub repository secrets (Settings > Secrets and variables > Secrets):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_SESSION_TOKEN      (if using temporary credentials)
#   DAGSTER_CLOUD_API_TOKEN (for the deploy step below)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Build and push
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPO_NAME }}:latest .
          docker push ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPO_NAME }}:latest

      - name: Substitute deployment values
        run: |
          sed -i "s|YOUR_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/YOUR_REPO_NAME|${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPO_NAME }}|g" dagster_cloud.yaml location.yaml

      # Notify Dagster Plus to reload the location with the new image.
