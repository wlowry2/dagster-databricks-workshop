# Hourly refresh — customer data validation pipeline
type: databricks_demo.components.scheduled_job_component.ScheduledJobComponent

attributes:
  job_name: customer_data_pipeline_hourly
  cron_schedule: "0 * * * *"  # every hour
  asset_selection: "group:customer_data_pipeline"
